name: Deploy to Timeweb via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: FTP Deploy to Timeweb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy static site to Timeweb (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.TIMEWEB_FTP_SERVER }}
          username: ${{ secrets.TIMEWEB_FTP_USERNAME }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          port: ${{ secrets.TIMEWEB_FTP_PORT }}
          protocol: ftp
          # Deploy the repository root; trailing slash is required
          local-dir: ./
          server-dir: /SHAR/public_html/
          # Never upload git/system/dev files — prevents 553 errors on Timeweb
          exclude: |
            - **/.git
            - **/.git/**
            - **/.github
            - **/.github/**
            - **/.cursor
            - **/.cursor/**
            - **/docs
            - **/docs/**
            - **/.DS_Store
            - .ftp-deploy-sync-state.json
            - vercel.json
