<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | SHAR Production</title>
    <meta name="robots" content="noindex,follow">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: #000000;
        }
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-404-main {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 120px 4% 80px;
        }
        .page-404-inner {
            max-width: 960px;
        }
        .page-404-code {
            font-size: clamp(5rem, 14vw, 10rem);
            font-weight: 300;
            letter-spacing: 0.18em;
            color: #ffffff;
            margin-bottom: 24px;
            text-shadow: 0 0 40px rgba(156, 4, 4, 0.45);
        }
        .page-404-text {
            font-size: 1.1rem;
            color: var(--grey);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 40px;
        }
        .page-404-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 40px;
            border-radius: 999px;
            border: 1px solid #9c0404;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #ffffff;
            background: transparent;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
        }
        .page-404-button:hover {
            background: #9c0404;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="page-404">
        <nav>
            <a href="index.html" class="logo"><span>SHAR</span> PRODUCTION</a>
        </nav>
        <main class="page-404-main">
            <div class="page-404-inner">
                <div class="page-404-code">404</div>
                <p class="page-404-text">Кадр потерян. Страница не найдена.</p>
                <a href="index.html" class="page-404-button">Вернуться в начало</a>
            </div>
        </main>
    </div>
</body>
</html>
